name: Deploy Next.js Frontend

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_NEET }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true

          script: |
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            export SITE_URL="https://neetell.in"
            export NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION="${{ secrets.GOOGLE_SITE_VERIFICATION }}"

            echo "Going to project folder..."
            cd /home/neetell/neetal-next

            echo "Stashing local VPS changes, if any..."
            git stash push -u -m "deploy-autostash-$(date +%Y%m%d%H%M%S)" || true

            echo "Pulling latest code..."
            git pull origin master

            echo "Installing dependencies..."
            npm ci --legacy-peer-deps

            echo "Building Next.js..."
            npm run build

            echo "Verifying generated SEO files, if present..."
            if [ -f public/sitemap.xml ]; then grep -q "https://neetell.in" public/sitemap.xml; fi
            if [ -f public/sitemap-0.xml ]; then grep -q "https://neetell.in" public/sitemap-0.xml; fi
            if [ -f public/robots.txt ]; then grep -q "https://neetell.in/sitemap.xml" public/robots.txt; fi

            echo "Restarting PM2..."
            pm2 restart neetall-next --update-env || pm2 start npm --name "neetall-next" -- start

            pm2 save

            echo "Checking live SEO endpoints..."
            sleep 3
            curl -fsS https://neetell.in/sitemap.xml | grep -q "https://neetell.in"
            curl -fsS https://neetell.in/robots.txt | grep -q "Sitemap: https://neetell.in/sitemap.xml"

            echo "Deployment done 🚀"
