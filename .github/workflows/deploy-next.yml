name: Deploy Next.js Frontend

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_NEET }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            export SITE_URL="https://neetell.in"
            export NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION="${{ secrets.GOOGLE_SITE_VERIFICATION }}"

            echo "Going to project folder..."
            cd /home/neetell/neetal-next

            echo "Pulling latest code..."
            git pull origin master

            echo "Installing dependencies..."
            npm install --legacy-peer-deps

            echo "Building Next.js..."
            npm run build

            echo "Verifying SEO files..."
            test -f public/sitemap.xml
            test -f public/sitemap-0.xml
            test -f public/robots.txt
            grep -q "https://neetell.in/sitemap-0.xml" public/sitemap.xml
            grep -q "https://neetell.in/sitemap.xml" public/robots.txt
            grep -q "https://neetell.in" public/sitemap-0.xml
            grep -q "image:image" public/sitemap-0.xml
            echo "SEO files generated successfully."

            echo "Restarting PM2..."
            pm2 restart neetall-next || pm2 start npm --name "neetall-next" -- start

            pm2 save

            echo "Deployment done 🚀"
